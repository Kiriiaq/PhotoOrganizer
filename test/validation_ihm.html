  /* ----------- Design sobre, imprimable, sans dépendance externe ---------- */
  :root {

    --border:    #ddd;

  * { box-sizing: border-box; }
  body {

  }
  h1 { font-size: 22px; margin: 0 0 6px; color: var(--primary); }
  h2 { font-size: 16px; margin: 22px 0 8px; color: var(--header-bg); }
  .subtitle { color: var(--muted); margin-bottom: 16px; }
  .meta {
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    padding: 14px 18px; margin-bottom: 16px;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px;
  }
  .meta label { display: block; font-size: 12px; color: var(--muted); }
  .meta input {
    width: 100%; padding: 6px 8px; border: 1px solid var(--border); border-radius: 4px;
    font-size: 13px; font-family: inherit;
  }
  .toolbar {
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 14px; margin-bottom: 16px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .toolbar button {
    padding: 8px 14px; border: 1px solid var(--border); border-radius: 4px;
    background: var(--panel); cursor: pointer; font-size: 13px;
    font-family: inherit; color: var(--text);
  }
  .toolbar button:hover { background: var(--section-bg); }
  .toolbar button.primary {
    background: var(--primary); color: white; border-color: var(--primary);
  }
  .toolbar button.danger {
    background: var(--nok); color: white; border-color: var(--nok);
  }
  .progress-bar {
    margin-left: auto; padding: 6px 12px; background: var(--section-bg);
    border-radius: 4px; font-size: 13px; color: var(--text); font-weight: 600;
  }
  table {
    width: 100%; border-collapse: collapse; background: var(--panel);
    border: 1px solid var(--border); margin-bottom: 20px; font-size: 13px;
  }
  thead th {
    background: var(--header-bg); color: var(--header-fg); padding: 8px 10px;
    text-align: left; font-weight: 600; border: 1px solid #1a5a8e;
    position: sticky; top: 0; z-index: 10;
  }
  tbody td {
    padding: 8px 10px; border: 1px solid var(--border); vertical-align: top;
  }
  tbody tr:nth-child(even) { background: var(--row-alt); }
  tbody tr.section-row {
    background: var(--section-bg); font-weight: 700; color: var(--header-bg);
  }
  .col-id        { width: 60px; font-family: 'Consolas', monospace; color: var(--muted); }
  .col-widget    { width: 220px; font-weight: 600; }
  .col-desc      { width: 280px; }
  .col-attendu   { width: 260px; color: var(--muted); }
  .col-status    { width: 110px; }
  .col-observe   { width: 180px; }
  .col-comment   { width: 200px; }
  select.status {
    width: 100%; padding: 4px 6px; border: 1px solid var(--border); border-radius: 4px;
    font-family: inherit; font-size: 12px;
  }
  select.status[data-value="OK"]      { background: #E8F5E9; color: var(--ok); font-weight: 600; }
  select.status[data-value="NOK"]     { background: #FFEBEE; color: var(--nok); font-weight: 600; }
  select.status[data-value="NA"]      { background: #F5F5F5; color: var(--na); }
  input.field, textarea.field {
    width: 100%; padding: 4px 6px; border: 1px solid var(--border); border-radius: 4px;
    font-family: inherit; font-size: 12px; resize: vertical;
  }
  textarea.field { min-height: 28px; }
  details { margin-bottom: 16px; }
  details summary {
    cursor: pointer; padding: 8px 12px; background: var(--section-bg);
    border-radius: 4px; font-weight: 600; color: var(--header-bg);
  }
  .export-area {
    background: #f0f0f0; border: 1px solid var(--border); border-radius: 4px;
    padding: 10px; margin-top: 10px; font-family: 'Consolas', monospace;
    font-size: 12px; white-space: pre-wrap; max-height: 300px; overflow: auto;
    display: none;
  }
  .export-area.visible { display: block; }
  /* Imprimante : optimisations */
  @media print {
    body { background: white; padding: 0; }
    .toolbar { display: none; }
    .meta, table { box-shadow: none; page-break-inside: avoid; }
    thead { display: table-header-group; }
    tr { page-break-inside: avoid; }
  }

const STORAGE_KEY = "photoorganizer_validation_ihm_v1";

/* ========================================================================
   Build UI : génère le tableau et restaure l'état depuis localStorage
   ======================================================================== */
function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  } catch (e) {
    return {};
  }
}

function saveState() {
  const state = {
    meta: {
      tool:     document.getElementById("meta-tool").value,
      version:  document.getElementById("meta-version").value,
      tester:   document.getElementById("meta-tester").value,
      date:     document.getElementById("meta-date").value,
      env:      document.getElementById("meta-env").value,
      hash:     document.getElementById("meta-hash").value,
    },
    widgets: {},
  };
  WIDGETS.forEach(w => {
    state.widgets[w.id] = {
      status:  document.querySelector(`select[data-widget="${w.id}"]`).value,
      observe: document.querySelector(`input[data-widget="${w.id}"][data-field="observe"]`).value,
      comment: document.querySelector(`textarea[data-widget="${w.id}"][data-field="comment"]`).value,
    };
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  updateProgress();
}

function updateProgress() {
  const total = WIDGETS.length;
  let done = 0;
  WIDGETS.forEach(w => {
    const status = document.querySelector(`select[data-widget="${w.id}"]`).value;
    if (status === "OK" || status === "NOK" || status === "NA") done++;
  });
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById("progress").textContent = `${done} / ${total} — ${pct} %`;
}

function buildChecklist() {
  const state = loadState();
  // Restaurer métadonnées
  if (state.meta) {
    Object.entries(state.meta).forEach(([k, v]) => {
      const el = document.getElementById(`meta-${k}`);
      if (el) el.value = v;
    });
  }
  // Date par défaut = aujourd'hui
  const dateInput = document.getElementById("meta-date");
  if (!dateInput.value) dateInput.value = new Date().toISOString().slice(0, 10);

  // Construire tableau groupé par section
  const container = document.getElementById("checklist");
  const sections = {};
  WIDGETS.forEach(w => {
    if (!sections[w.section]) sections[w.section] = [];
    sections[w.section].push(w);
  });

  let html = '';
  Object.entries(sections).forEach(([section, widgets]) => {
    html += `<details open>
      <summary>${section} <span style="color:#777;font-weight:normal;">(${widgets.length})</span></summary>
      <table>
        <thead>
          <tr>
            <th class="col-id">ID</th>
            <th class="col-widget">Widget</th>
            <th class="col-desc">Description</th>
            <th class="col-attendu">Comportement attendu</th>
            <th class="col-status">Statut</th>
            <th class="col-observe">Valeur observée</th>
            <th class="col-comment">Commentaire</th>
          </tr>
        </thead>
        <tbody>`;
    widgets.forEach(w => {
      const s = (state.widgets && state.widgets[w.id]) || {};
      const status  = s.status  || "À faire";
      const observe = s.observe || "";
      const comment = s.comment || "";
      html += `<tr>
        <td class="col-id">${w.id}</td>
        <td class="col-widget">${escapeHtml(w.widget)}</td>
        <td class="col-desc">${escapeHtml(w.desc)}</td>
        <td class="col-attendu">${escapeHtml(w.attendu)}</td>
        <td>
          <select class="status" data-widget="${w.id}" data-value="${status}" onchange="updateStatusColor(this); saveState();">
            <option value="À faire" ${status === 'À faire' ? 'selected' : ''}>À faire</option>
            <option value="OK"      ${status === 'OK' ? 'selected' : ''}>OK</option>
            <option value="NOK"     ${status === 'NOK' ? 'selected' : ''}>NOK</option>
            <option value="NA"      ${status === 'NA' ? 'selected' : ''}>NA</option>
          </select>
        </td>
        <td><input class="field" data-widget="${w.id}" data-field="observe" value="${escapeHtml(observe)}" oninput="saveState()" placeholder="ex. couleur, position…"></td>
        <td><textarea class="field" data-widget="${w.id}" data-field="comment" oninput="saveState()" placeholder="Notes…">${escapeHtml(comment)}</textarea></td>
      </tr>`;
    });
    html += `</tbody></table></details>`;
  });
  container.innerHTML = html;

  // Initial color update
  document.querySelectorAll("select.status").forEach(updateStatusColor);
  updateProgress();
}

function updateStatusColor(select) {
  select.setAttribute("data-value", select.value);
}

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  })[c]);
}

/* ========================================================================
   Persistence métadonnées sur changement
   ======================================================================== */
document.addEventListener("DOMContentLoaded", () => {
  buildChecklist();
  // Auto-save sur changement métadonnées
  ["meta-tool", "meta-version", "meta-tester", "meta-date", "meta-env", "meta-hash"].forEach(id => {
    document.getElementById(id).addEventListener("input", saveState);
  });
});

/* ========================================================================
   Export JSON / Markdown / Clear
   ======================================================================== */
function exportJSON() {
  const state = loadState();
  saveState();
  const json = JSON.stringify(loadState(), null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `validation_ihm_${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportMarkdown() {
  saveState();
  const state = loadState();
  const meta = state.meta || {};
  let md = `## Validation IHM — ${meta.tool || ""} ${meta.version || ""}\n\n`;
  md += `| Champ | Valeur |\n|---|---|\n`;
  md += `| Testeur | ${meta.tester || ""} |\n`;
  md += `| Date | ${meta.date || ""} |\n`;
  md += `| Environnement | ${meta.env || ""} |\n`;
  md += `| Build hash | ${meta.hash || ""} |\n\n`;

  // Synthèse
  const counts = { "OK": 0, "NOK": 0, "NA": 0, "À faire": 0 };
  WIDGETS.forEach(w => {
    const s = (state.widgets || {})[w.id] || {};
    const st = s.status || "À faire";
    counts[st] = (counts[st] || 0) + 1;
  });
  const total = WIDGETS.length;
  md += `### Synthèse\n\n`;
  md += `| Statut | Nombre | Taux |\n|---|---|---|\n`;
  Object.entries(counts).forEach(([k, v]) => {
    const pct = total ? Math.round(v / total * 1000) / 10 : 0;
    md += `| ${k} | ${v} | ${pct} % |\n`;
  });

  // Anomalies (NOK uniquement)
  const noks = WIDGETS.filter(w => {
    const s = (state.widgets || {})[w.id] || {};
    return s.status === "NOK";
  });
  if (noks.length) {
    md += `\n### Anomalies détectées\n\n`;
    md += `| ID | Widget | Section | Observation | Commentaire |\n|---|---|---|---|---|\n`;
    noks.forEach(w => {
      const s = (state.widgets || {})[w.id] || {};
      md += `| ${w.id} | ${w.widget.replace(/\|/g, '\\|')} | ${w.section.replace(/\|/g, '\\|')} | ${(s.observe || '').replace(/\|/g, '\\|')} | ${(s.comment || '').replace(/\|/g, '\\|').replace(/\n/g, ' ')} |\n`;
    });
  }

  const out = document.getElementById("export-out");
  out.textContent = md;
  out.classList.add("visible");
  // Copier dans le presse-papier si possible
  if (navigator.clipboard) {
    navigator.clipboard.writeText(md).then(() => {
      alert("Markdown copié dans le presse-papier !");
    }).catch(() => {});
  }
}

function clearAll() {
  if (!confirm("Effacer tous les statuts, observations et commentaires ?")) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}
