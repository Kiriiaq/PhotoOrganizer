name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # La clé HMAC qui signe les licences est gitignorée (src/utils/_secret.py).
      # Sans cette étape, l'EXE serait buildé avec le placeholder et AUCUNE
      # vraie clé de licence ne validerait (cf. NEXT_STEPS §E.1). Le secret
      # repo HMAC_SECRET_B64 contient le fichier _secret.py encodé base64.
      - name: Inject HMAC secret (license signing)
        shell: bash
        env:
          HMAC_SECRET_B64: ${{ secrets.HMAC_SECRET_B64 }}
        run: |
          if [ -z "$HMAC_SECRET_B64" ]; then
            echo "::error::Secret repo HMAC_SECRET_B64 manquant — l'EXE serait signé avec la clé placeholder."
            exit 1
          fi
          echo "$HMAC_SECRET_B64" | base64 -d > src/utils/_secret.py
          python -c "import sys; sys.path.insert(0, 'src'); from utils._secret import SECRET_KEY; assert SECRET_KEY != b'placeholder-replace-at-build-time', 'placeholder detecte'; print('Secret HMAC injecte et verifie (', len(SECRET_KEY), 'octets).')"

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build Release executable
        run: python build.py
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Build Debug executable
        run: python build.py --debug
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          PHOTOORGANIZER_DEBUG: "1"

      - name: Generate checksums
        shell: bash
        run: cd dist && sha256sum *.exe > checksums-sha256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: photoorganizer-${{ steps.version.outputs.VERSION }}-windows
          path: |
            dist/*.exe
            dist/checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PhotoOrganizer ${{ github.ref_name }}"
          body: |
            ## PhotoOrganizer ${{ github.ref_name }}

            ### Downloads
            - **Release**: `PhotoOrganizer-${{ steps.version.outputs.VERSION }}.exe` (windowed, no console)
            - **Debug**: `PhotoOrganizer-${{ steps.version.outputs.VERSION }}-debug.exe` (console + verbose logging)

            Download the Release `.exe` and run it. No installation required.

            ---
            [Changelog](https://github.com/Kiriiaq/PhotoOrganizer/blob/main/CHANGELOG.md) | [Ko-fi](https://ko-fi.com/Kiriiaq)
          files: |
            dist/*.exe
            dist/checksums-sha256.txt
